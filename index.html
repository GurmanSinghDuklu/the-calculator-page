        { "@type": "DefinedTerm", "name": "APRC", "description": "Annual Percentage Rate of Charge — the true cost of a mortgage including fees and interest, expressed as an annual percentage.", "url": "https://www.thecalculatorapp.org/finance/mortgage" },

        { "@type": "DefinedTerm", "name": "PAYE", "description": "Pay As You Earn — the UK system for collecting income tax and National Insurance directly from employee salaries.", "url": "https://www.thecalculatorapp.org/finance/salary" },
        { "@type": "DefinedTerm", "name": "SDLT", "description": "Stamp Duty Land Tax — a UK tax paid when purchasing property above a threshold value.", "url": "https://www.thecalculatorapp.org/finance/stamp-duty" },
        { "@type": "DefinedTerm", "name": "ISA", "description": "Individual Savings Account — a UK tax-free savings and investment wrapper with an annual allowance of £20,000.", "url": "https://www.thecalculatorapp.org/finance/isa-calculator" },
        { "@type": "DefinedTerm", "name": "Compound Interest", "description": "Interest calculated on both the initial principal and accumulated interest from previous periods. Formula: A = P(1 + r/n)^(nt).", "url": "https://www.thecalculatorapp.org/finance/compound-interest" },
        { "@type": "DefinedTerm", "name": "LTV", "description": "Loan to Value — the ratio of a mortgage loan to the appraised value of the property, expressed as a percentage.", "url": "https://www.thecalculatorapp.org/finance/mortgage" },
        { "@type": "DefinedTerm", "name": "FICA", "description": "Federal Insurance Contributions Act — US payroll tax covering Social Security (6.2%) and Medicare (1.45%).", "url": "https://www.thecalculatorapp.org/finance/us-salary-calculator" },
        { "@type": "DefinedTerm", "name": "401(k)", "description": "A US tax-advantaged retirement savings plan sponsored by employers, allowing pre-tax contributions up to $23,500 in 2025.", "url": "https://www.thecalculatorapp.org/finance/401k-calculator" },
